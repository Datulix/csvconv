name: Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Download pdfium for Windows x64
        shell: bash
        run: |
          curl -L "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz" -o pdfium-win-x64.tgz
          mkdir -p /tmp/pdfium-win
          tar xzf pdfium-win-x64.tgz -C /tmp/pdfium-win
          mkdir -p src-tauri/binaries
          cp /tmp/pdfium-win/bin/pdfium.dll src-tauri/binaries/pdfium.dll

      - name: Build Windows installer
        run: npm run tauri build

      - name: Upload installer (MSI)
        uses: actions/upload-artifact@v4
        with:
          name: csvconv-windows-x64-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload installer (NSIS .exe)
        uses: actions/upload-artifact@v4
        with:
          name: csvconv-windows-x64-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
