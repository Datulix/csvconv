name: Release

on:
  push:
    branches: [main]

jobs:
  tag:
    name: Bump version tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          LATEST=$(git tag --list 'v*.*.*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v0.0.1"
          else
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LATEST | cut -d. -f2)
            PATCH=$(echo $LATEST | cut -d. -f3)
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          git tag $NEW_TAG
          git push origin $NEW_TAG

  android:
    name: Android APK (arm64)
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and platform
        run: |
          sdkmanager "ndk;27.0.12077973" "build-tools;34.0.0" "platforms;android-34"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Rust with Android arm64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri Android project
        run: npm run tauri android init
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Download pdfium for Android arm64
        run: |
          curl -L "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-android-arm64.tgz" -o pdfium-android-arm64.tgz
          mkdir -p /tmp/pdfium-arm64
          tar xzf pdfium-android-arm64.tgz -C /tmp/pdfium-arm64
          mkdir -p src-tauri/gen/android/app/src/main/jniLibs/arm64-v8a
          cp /tmp/pdfium-arm64/lib/libpdfium.so src-tauri/gen/android/app/src/main/jniLibs/arm64-v8a/

      - name: Build Android APK (release, arm64)
        run: npm run tauri android build -- --apk --target aarch64
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Find APK
        run: find src-tauri/gen/android/app/build/outputs/apk -name "*.apk"

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: ${{ needs.tag.outputs.new_tag }}
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  windows:
    name: Windows Installer (x64)
    needs: tag
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Download pdfium for Windows x64
        shell: bash
        run: |
          curl -L "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz" -o pdfium-win-x64.tgz
          mkdir -p /tmp/pdfium-win
          tar xzf pdfium-win-x64.tgz -C /tmp/pdfium-win
          mkdir -p src-tauri/binaries
          cp /tmp/pdfium-win/bin/pdfium.dll src-tauri/binaries/pdfium.dll

      - name: Build Windows installer
        run: npm run tauri build

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: ${{ needs.tag.outputs.new_tag }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
