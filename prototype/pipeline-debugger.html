<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCQ Pipeline Debugger</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3354;
    --accent: #6366f1;
    --accent-dim: #4f52cc;
    --text: #e2e5f1;
    --text-dim: #8b90b8;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --orange: #f97316;
    --radius: 8px;
    --font-mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon { font-size: 22px; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
  .badge {
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* ── Stepper ─────────────────────────────── */
  .stepper-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    overflow-x: auto;
    display: flex;
    align-items: stretch;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }
  .step-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 14px;
    cursor: pointer;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11px;
    gap: 4px;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    position: relative;
  }
  .step-btn:hover { color: var(--text); background: var(--surface2); }
  .step-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .step-btn.active .step-num {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .step-label { white-space: nowrap; font-weight: 500; }
  .step-kind { font-size: 9px; opacity: .7; }
  .step-arrow { color: var(--border); font-size: 14px; padding: 0 2px; align-self: center; }

  /* ── Main layout ─────────────────────────── */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    overflow: hidden;
    height: calc(100vh - 110px);
  }
  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }
  .panel:last-child { border-right: none; }
  .panel-header {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .panel-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); }
  .panel-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid;
  }
  .tag-ai { background: #1e1b4b; border-color: var(--accent); color: var(--accent); }
  .tag-sys { background: #1a2636; border-color: var(--blue); color: var(--blue); }
  .tag-data { background: #1a2720; border-color: var(--green); color: var(--green); }
  .panel-body { flex: 1; overflow-y: auto; padding: 16px; }

  /* ── Content blocks ─────────────────────── */
  .section { margin-bottom: 20px; }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 8px;
  }
  pre, code {
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .code-block {
    background: #0a0c14;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    overflow-x: auto;
    line-height: 1.6;
    color: #a9b1d6;
  }
  .code-block .kw { color: #bb9af7; }
  .code-block .str { color: #9ece6a; }
  .code-block .num { color: #ff9e64; }
  .code-block .key { color: #7dcfff; }
  .code-block .cmt { color: #565f89; font-style: italic; }

  /* ── Table ─────────────────────────────── */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
    font-weight: 600;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .data-table td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    vertical-align: top;
  }
  .data-table tr:hover td { background: var(--surface2); }
  .data-table tr.highlight td { background: #1e1b4b44; }
  .data-table tr.merged td { background: #1a27204a; }

  /* ── Confidence bar ────────────────────── */
  .conf-wrap { display: flex; align-items: center; gap: 6px; min-width: 90px; }
  .conf-bar-bg { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .conf-bar { height: 100%; border-radius: 3px; transition: width .3s; }
  .conf-val { font-size: 11px; min-width: 30px; text-align: right; }
  .conf-green .conf-bar { background: var(--green); }
  .conf-green .conf-val { color: var(--green); }
  .conf-yellow .conf-bar { background: var(--yellow); }
  .conf-yellow .conf-val { color: var(--yellow); }
  .conf-red .conf-bar { background: var(--red); }
  .conf-red .conf-val { color: var(--red); }

  /* ── Badges ─────────────────────────────── */
  .pill {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 600;
  }
  .pill-green { background: #14532d44; color: var(--green); border: 1px solid #14532d; }
  .pill-red { background: #7f1d1d44; color: var(--red); border: 1px solid #7f1d1d; }
  .pill-yellow { background: #71350044; color: var(--yellow); border: 1px solid #713500; }
  .pill-blue { background: #1e3a5f44; color: var(--blue); border: 1px solid #1e3a5f; }
  .pill-purple { background: #1e1b4b44; color: var(--accent); border: 1px solid #1e1b4b; }

  /* ── Image placeholder grid ─────────────── */
  .page-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .page-thumb {
    width: 90px; height: 120px;
    border-radius: 6px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text-dim);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .page-thumb .pg-num {
    font-size: 11px; font-weight: 700; color: var(--text);
    position: absolute; top: 6px; left: 6px;
    background: #0009; padding: 1px 5px; border-radius: 3px;
  }
  .page-thumb .pg-label {
    position: absolute; bottom: 4px;
    font-size: 9px; text-align: center; padding: 0 4px;
  }
  /* simulated page scan bg */
  .page-thumb { background: repeating-linear-gradient(0deg, #1a1d2700 0px, #1a1d2700 18px, #22263a 18px, #22263a 19px); }
  .page-thumb.pg-a { border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f688; }
  .page-thumb.pg-b { border-color: #22c55e; box-shadow: 0 0 0 1px #22c55e44; }

  /* ── Diff highlight ─────────────────────── */
  .diff-add { background: #14532d33; color: var(--green); }
  .diff-rem { background: #7f1d1d33; color: var(--red); text-decoration: line-through; }
  .diff-neutral { color: var(--text-dim); }

  /* ── Agreement indicator ────────────────── */
  .agree { color: var(--green); font-size: 15px; }
  .disagree { color: var(--red); font-size: 15px; }

  /* ── Expand row ─────────────────────────── */
  .expand-row td { background: #0a0c14 !important; padding: 10px 14px; font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); line-height: 1.6; }

  /* ── Prompt box ─────────────────────────── */
  .prompt-box {
    background: #0a0c14;
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    line-height: 1.65;
    color: #c0c7ef;
    white-space: pre-wrap;
    overflow-x: auto;
  }
  .prompt-box .ph { color: #f97316; background: #f9731622; border-radius: 3px; padding: 0 2px; }

  /* ── Info card ───────────────────────────── */
  .info-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .info-row { display: flex; align-items: baseline; gap: 8px; font-size: 12px; }
  .info-key { color: var(--text-dim); min-width: 140px; }
  .info-val { color: var(--text); font-family: var(--font-mono); }

  /* ── CSV preview ─────────────────────────── */
  .csv-pre {
    background: #0a0c14;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: #a9b1d6;
    overflow-x: auto;
    line-height: 1.5;
  }
  .csv-pre .csv-header { color: #7dcfff; font-weight: 700; }

  /* ── Collapsible ─────────────────────────── */
  details { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-top: 12px; }
  details summary {
    cursor: pointer;
    padding: 8px 12px;
    background: var(--surface2);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    list-style: none;
    user-select: none;
  }
  details summary::-webkit-details-marker { display: none; }
  details summary::before { content: '▶ '; font-size: 9px; }
  details[open] summary::before { content: '▼ '; }
  details .details-body { padding: 12px; }

  /* ── Scrollbar ──────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🔬</div>
  <div>
    <h1>MCQ Pipeline Debugger</h1>
    <div class="header-sub">Visualize each processing phase — input sent to model &amp; output received</div>
  </div>
  <div class="badge">Demo · Mock Data · sample_exam.pdf (10 questions)</div>
</div>

<!-- Stepper -->
<div class="stepper-wrap" id="stepper"></div>

<!-- Main panels -->
<div class="main">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">⬆ Input</span>
      <span id="input-tag" class="panel-tag"></span>
      <span id="input-desc" style="font-size:11px;color:var(--text-dim);margin-left:auto;"></span>
    </div>
    <div class="panel-body" id="input-body"></div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">⬇ Output</span>
      <span id="output-tag" class="panel-tag"></span>
      <span id="output-desc" style="font-size:11px;color:var(--text-dim);margin-left:auto;"></span>
    </div>
    <div class="panel-body" id="output-body"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────
function conf(value) {
  const cls = value >= 0.75 ? 'conf-green' : value >= 0.5 ? 'conf-yellow' : 'conf-red';
  return `<div class="conf-wrap ${cls}">
    <div class="conf-bar-bg"><div class="conf-bar" style="width:${value*100}%"></div></div>
    <div class="conf-val">${value.toFixed(2)}</div>
  </div>`;
}

function pill(text, color) {
  return `<span class="pill pill-${color}">${text}</span>`;
}

function thumb(n, label, cls='') {
  return `<div class="page-thumb ${cls}">
    <div class="pg-num">${n}</div>
    <div style="font-size:24px;opacity:.15">📄</div>
    <div class="pg-label">${label}</div>
  </div>`;
}

function table(headers, rows, opts={}) {
  const ths = headers.map(h=>`<th>${h}</th>`).join('');
  const trs = rows.map(([cls,...cells])=>{
    const tds = cells.map(c=>`<td>${c}</td>`).join('');
    return `<tr class="${cls}">${tds}</tr>`;
  }).join('');
  return `<table class="data-table">${opts.caption?`<caption style="color:var(--text-dim);font-size:11px;text-align:left;padding-bottom:6px">${opts.caption}</caption>`:''}<thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}

function section(label, content) {
  return `<div class="section"><div class="section-label">${label}</div>${content}</div>`;
}

function codeBlock(text) {
  // Simple JSON highlighter
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const highlighted = escaped
    .replace(/"([^"]+)"(?=\s*:)/g, '<span class="key">"$1"</span>')
    .replace(/:\s*"([^"]*)"/g, ': <span class="str">"$1"</span>')
    .replace(/:\s*(\d+\.?\d*)/g, ': <span class="num">$1</span>')
    .replace(/:\s*(true|false|null)/g, ': <span class="kw">$1</span>');
  return `<div class="code-block"><pre>${highlighted}</pre></div>`;
}

function promptBox(text) {
  return `<div class="prompt-box">${text}</div>`;
}

function infoCard(pairs) {
  const rows = pairs.map(([k,v])=>`<div class="info-row"><div class="info-key">${k}</div><div class="info-val">${v}</div></div>`).join('');
  return `<div class="info-card">${rows}</div>`;
}

// ─────────────────────────────────────────────────────────────────
// Phase definitions
// ─────────────────────────────────────────────────────────────────
const PHASES = [
  {
    id: 1, name: 'Triage', kind: '⚙ System',
    tagClass: 'tag-sys',
    inputDesc: 'PDF file + run ID',
    outputDesc: 'Per-page metadata',
    input() {
      return section('Rust command invoked', infoCard([
        ['Command', 'triage_pdf'],
        ['pdf_path', 'C:\\Users\\PC\\Documents\\sample_exam.pdf'],
        ['run_id', 'run_20260525_143201'],
        ['dpi_hint', '300'],
      ])) +
      section('What Triage checks per page', `<ul style="font-size:12px;color:var(--text-dim);padding-left:18px;line-height:2">
        <li>Extracts text via pdfium → <strong>text_density</strong> (char count)</li>
        <li>Renders to 72 DPI grayscale → pixel histogram → <strong>is_blank</strong></li>
        <li>Classifies: digital (&gt;50 chars) / scanned (&lt;5 chars) / mixed</li>
        <li>Runs Hough transform on scanned pages → <strong>skew_angle_deg</strong></li>
      </ul>`);
    },
    output() {
      return section('TriageResult', codeBlock(`{
  "pdf_type": "mixed",
  "page_count": 12,
  "pages": [
    { "page_number": 1,  "is_blank": false, "page_type": "digital", "text_density": 1240, "skew_angle_deg": 0.0  },
    { "page_number": 2,  "is_blank": false, "page_type": "scanned", "text_density": 3,    "skew_angle_deg": -1.2 },
    { "page_number": 3,  "is_blank": false, "page_type": "scanned", "text_density": 2,    "skew_angle_deg": -1.3 },
    { "page_number": 4,  "is_blank": false, "page_type": "scanned", "text_density": 4,    "skew_angle_deg": -0.8 },
    { "page_number": 5,  "is_blank": false, "page_type": "scanned", "text_density": 1,    "skew_angle_deg": -1.1 },
    { "page_number": 6,  "is_blank": true,  "page_type": "scanned", "text_density": 0,    "skew_angle_deg": 0.0  },
    { "page_number": 7,  "is_blank": false, "page_type": "scanned", "text_density": 5,    "skew_angle_deg": -0.9 },
    { "page_number": 8,  "is_blank": false, "page_type": "scanned", "text_density": 3,    "skew_angle_deg": -1.4 },
    { "page_number": 9,  "is_blank": false, "page_type": "scanned", "text_density": 2,    "skew_angle_deg": -0.7 },
    { "page_number": 10, "is_blank": false, "page_type": "scanned", "text_density": 4,    "skew_angle_deg": -1.0 },
    { "page_number": 11, "is_blank": false, "page_type": "scanned", "text_density": 6,    "skew_angle_deg": -0.5 },
    { "page_number": 12, "is_blank": true,  "page_type": "scanned", "text_density": 0,    "skew_angle_deg": 0.0  }
  ]
}`)) +
      section('Summary', table(
        ['Page','Type','Blank','Text density','Skew angle'],
        [
          ['','1','digital','—','1240 chars','0.0°'],
          ['','2','scanned','—','3 chars','-1.2°'],
          ['','3','scanned','—','2 chars','-1.3°'],
          ['','4','scanned','—','4 chars','-0.8°'],
          ['','5','scanned','—','1 char','-1.1°'],
          ['highlight','6','scanned',pill('BLANK','red'),'0','0.0°'],
          ['','7','scanned','—','5 chars','-0.9°'],
          ['','8','scanned','—','3 chars','-1.4°'],
          ['','9','scanned','—','2 chars','-0.7°'],
          ['','10','scanned','—','4 chars','-1.0°'],
          ['','11','scanned','—','6 chars','-0.5°'],
          ['highlight','12','scanned',pill('BLANK','red'),'0','0.0°'],
        ]
      ));
    }
  },

  {
    id: 2, name: 'Rasterize', kind: '⚙ System',
    tagClass: 'tag-sys',
    inputDesc: 'TriageResult + deskew hints',
    outputDesc: 'Page JPEG files',
    input() {
      return section('Rust command invoked', infoCard([
        ['Command', 'rasterize_pdf'],
        ['pdf_path', 'C:\\Users\\PC\\Documents\\sample_exam.pdf'],
        ['dpi', '300'],
        ['quality', '82'],
        ['max_long_edge_px', '2048'],
        ['skip_pages', '[6, 12]  ← blank from triage'],
        ['deskew_pages', '[2,3,4,5,7,8,9,10,11]'],
        ['skew_angles', '[-1.2, -1.3, -0.8, -1.1, -0.9, -1.4, -0.7, -1.0, -0.5]'],
      ])) +
      section('Processing applied per page', `<ul style="font-size:12px;color:var(--text-dim);padding-left:18px;line-height:2">
        <li>Render PDF page at 300 DPI → RGBA bitmap</li>
        <li>Re-encode as JPEG quality=82, cap 2048px</li>
        <li>Scanned pages: rotate by −skew_angle, auto-contrast</li>
        <li>Blank pages: <em>skipped entirely</em></li>
        <li>Output written to <code>%APPDATA%/csvconv/staging/run_20260525_143201/</code></li>
      </ul>`);
    },
    output() {
      return section('RasterizeResult', codeBlock(`{
  "staging_dir": "C:\\\\AppData\\\\Roaming\\\\csvconv\\\\staging\\\\run_20260525_143201",
  "pages": [
    { "page_number": 1,  "path": "page-001.jpg", "width": 1654, "height": 2339, "deskewed": false, "skipped": false },
    { "page_number": 2,  "path": "page-002.jpg", "width": 1654, "height": 2339, "deskewed": true,  "skipped": false },
    { "page_number": 6,  "path": null,            "width": 0,    "height": 0,    "deskewed": false, "skipped": true  },
    { "page_number": 12, "path": null,            "width": 0,    "height": 0,    "deskewed": false, "skipped": true  }
  ]
}`)) +
      section('Output page thumbnails (simulated)', `<div class="page-grid">
        ${thumb(1,'digital<br>no deskew','pg-b')}
        ${thumb(2,'scanned<br>deskewed','pg-b')}
        ${thumb(3,'scanned<br>deskewed','pg-b')}
        ${thumb(4,'scanned<br>deskewed','pg-b')}
        ${thumb(5,'scanned<br>deskewed','pg-b')}
        <div class="page-thumb" style="opacity:.3;border-style:dashed">${'<div class="pg-num">6</div><div style="font-size:20px">🚫</div><div class="pg-label">SKIPPED</div>'}</div>
        ${thumb(7,'scanned<br>deskewed','pg-b')}
        ${thumb(8,'scanned<br>deskewed','pg-b')}
        ${thumb(9,'scanned<br>deskewed','pg-b')}
        ${thumb(10,'scanned<br>deskewed','pg-b')}
        ${thumb(11,'scanned<br>deskewed','pg-b')}
        <div class="page-thumb" style="opacity:.3;border-style:dashed">${'<div class="pg-num">12</div><div style="font-size:20px">🚫</div><div class="pg-label">SKIPPED</div>'}</div>
      </div>`);
    }
  },

  {
    id: 3, name: 'Detect Format', kind: '🤖 AI',
    tagClass: 'tag-ai',
    inputDesc: 'Sample pages + prompt → model',
    outputDesc: 'DetectorResult',
    input() {
      return section('Sample pages sent to model (3 pages)', `<div class="page-grid">
        ${thumb(1,'Page 1<br>first page','pg-a')}
        ${thumb(6,'Page 6<br>middle','pg-a')}
        ${thumb(11,'Page 11<br>last','pg-a')}
      </div>`) +
      section('Prompt sent to model', promptBox(
`You are analyzing a multiple-choice exam. The images show sample pages from the PDF.

Your task: identify the answer-marking FORMAT used in this document.

Choose ONE of these formats:

// Render
// ─────────────────────────────────────────────────────────────────
let activePhase = 1;

function renderStepper() {
  const el = document.getElementById('stepper');
  el.innerHTML = PHASES.map((p, i) => `
    <div class="step">
      <button class="step-btn ${p.id === activePhase ? 'active' : ''}" onclick="setPhase(${p.id})">
        <div class="step-num">${p.id}</div>
        <div class="step-label">${p.name}</div>
        <div class="step-kind">${p.kind}</div>
      </button>
      ${i < PHASES.length - 1 ? '<div class="step-arrow">›</div>' : ''}
    </div>
  `).join('');
}

function renderPhase(phase) {
  const isAI = phase.kind.includes('🤖');
  const isSys = phase.kind.includes('⚙');

  document.getElementById('input-tag').className = `panel-tag ${phase.tagClass}`;
  document.getElementById('input-tag').textContent = phase.kind;
  document.getElementById('input-desc').textContent = phase.inputDesc;

  document.getElementById('output-tag').className = `panel-tag ${phase.tagClass}`;
  document.getElementById('output-tag').textContent = phase.kind;
  document.getElementById('output-desc').textContent = phase.outputDesc;

  document.getElementById('input-body').innerHTML = phase.input();
  document.getElementById('output-body').innerHTML = phase.output();
}

function setPhase(id) {
  activePhase = id;
  renderStepper();
  renderPhase(PHASES.find(p => p.id === id));
  // scroll panels to top
  document.getElementById('input-body').scrollTop = 0;
  document.getElementById('output-body').scrollTop = 0;
}

// Initial render
renderStepper();
renderPhase(PHASES[0]);
